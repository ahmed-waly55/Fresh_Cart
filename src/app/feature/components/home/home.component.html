<section class="bg-gray-200 p-2">

   <h1 class="text-emerald-400 text-center text-4xl border-b-2 border-emerald-400 my-3"> ALL PRODUCTS</h1>
  <div class="container mx-auto">

    <div class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 " >

      @for(product of products; track product.id){
       <div class="outter p-3">
         <div class="product">
        <div>
           <img [src]="product.imageCover" class="w-full block" [alt]="product.title" class="w-full h-auto">
        </div>
        <h1 class="text-emerald-400 font-extrabold">Title : {{ product.title }}</h1>
        <h2 class="text-emerald-400">Price : ${{ product.price }}</h2>
        <h3  class="text-emerald-400">Category : {{ product.category.name }}</h3>
    </div>
       </div>

      }

    </div>


  </div>
</section>
